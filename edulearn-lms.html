<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduLearn LMS — Easwari Engineering College</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f1a;
    --surface: #131929;
    --surface2: #1a2236;
    --surface3: #1f2a42;
    --border: rgba(255,255,255,0.07);
    --accent: #4f8ef7;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --accent4: #f59e0b;
    --accent5: #ef4444;
    --text: #e8edf7;
    --text2: #8b98b5;
    --text3: #5a6580;
    --glow: rgba(79,142,247,0.15);
    --font-display: 'DM Serif Display', serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --sidebar-w: 240px;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── LAYOUT ─── */
  #app { display: flex; height: 100vh; overflow: hidden; }

  /* ─── SIDEBAR ─── */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: width 0.3s ease;
    position: relative;
    z-index: 10;
  }

  .sidebar-logo {
    padding: 28px 20px 20px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo .wordmark {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .sidebar-logo .wordmark span { color: var(--accent); }
  .sidebar-logo .tagline {
    font-size: 10px;
    color: var(--text3);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-family: var(--font-mono);
  }

  .nav-section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.8px;
    color: var(--text3);
    padding: 18px 20px 6px;
    font-family: var(--font-mono);
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 20px;
    cursor: pointer;
    transition: all 0.18s;
    border-radius: 0;
    color: var(--text2);
    font-size: 14px;
    font-weight: 400;
    position: relative;
    margin: 1px 8px;
    border-radius: var(--radius-sm);
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active {
    background: linear-gradient(135deg, rgba(79,142,247,0.15), rgba(124,58,237,0.08));
    color: var(--accent);
    font-weight: 500;
  }
  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 20%; bottom: 20%;
    width: 3px;
    background: var(--accent);
    border-radius: 0 3px 3px 0;
    margin-left: -8px;
  }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
  .nav-item .badge {
    margin-left: auto;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    font-family: var(--font-mono);
    font-weight: 600;
  }

  .sidebar-footer {
    margin-top: auto;
    padding: 16px;
    border-top: 1px solid var(--border);
  }
  .user-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.2s;
  }
  .user-card:hover { background: var(--surface2); }
  .user-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .user-info .name { font-size: 13px; font-weight: 500; color: var(--text); }
  .user-info .role { font-size: 11px; color: var(--text3); font-family: var(--font-mono); }

  /* ─── MAIN ─── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ─── TOPBAR ─── */
  #topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 62px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .topbar-title {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--text);
    flex: 1;
  }
  .topbar-search {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 16px;
    width: 260px;
  }
  .topbar-search input {
    background: none;
    border: none;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    outline: none;
    width: 100%;
  }
  .topbar-search input::placeholder { color: var(--text3); }
  .topbar-search .search-icon { color: var(--text3); font-size: 14px; }

  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 15px;
    transition: all 0.18s;
    position: relative;
  }
  .icon-btn:hover { background: var(--surface3); border-color: var(--accent); }
  .notif-dot {
    position: absolute;
    top: 6px; right: 6px;
    width: 8px; height: 8px;
    background: var(--accent5);
    border-radius: 50%;
    border: 2px solid var(--surface);
  }

  /* ─── CONTENT ─── */
  #content {
    flex: 1;
    overflow-y: auto;
    padding: 28px;
  }
  #content::-webkit-scrollbar { width: 5px; }
  #content::-webkit-scrollbar-track { background: transparent; }
  #content::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 10px; }

  /* ─── VIEWS ─── */
  .view { display: none; animation: fadeIn 0.3s ease; }
  .view.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ─── ROLE SWITCHER ─── */
  .role-switcher {
    display: flex;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 4px;
  }
  .role-btn {
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text2);
    font-family: var(--font-mono);
  }
  .role-btn.active { background: var(--accent); color: #fff; }

  /* ─── CARDS ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: rgba(79,142,247,0.2); }
  .card-title {
    font-size: 13px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-family: var(--font-mono);
    margin-bottom: 8px;
  }
  .card-value {
    font-family: var(--font-display);
    font-size: 36px;
    color: var(--text);
    line-height: 1;
  }
  .card-sub { font-size: 12px; color: var(--text3); margin-top: 6px; }
  .card-icon {
    font-size: 28px;
    margin-bottom: 12px;
  }

  /* ─── GRIDS ─── */
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

  /* ─── SECTION HEADERS ─── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--text);
  }
  .section-sub { font-size: 13px; color: var(--text3); margin-top: 2px; }

  /* ─── BUTTONS ─── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 18px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.18s;
    font-family: var(--font-body);
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3a7de8; transform: translateY(-1px); }
  .btn-ghost {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-success { background: var(--accent3); color: #fff; }
  .btn-warning { background: var(--accent4); color: #000; }
  .btn-danger { background: var(--accent5); color: #fff; }
  .btn-sm { padding: 6px 14px; font-size: 12px; }

  /* ─── PROGRESS BAR ─── */
  .progress-bar {
    height: 6px;
    background: var(--surface3);
    border-radius: 10px;
    overflow: hidden;
    margin: 8px 0;
  }
  .progress-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 1s ease;
  }
  .fill-blue { background: linear-gradient(90deg, var(--accent), #7c3aed); }
  .fill-green { background: linear-gradient(90deg, var(--accent3), #059669); }
  .fill-amber { background: linear-gradient(90deg, var(--accent4), #d97706); }
  .fill-red { background: linear-gradient(90deg, var(--accent5), #dc2626); }

  /* ─── COURSE CARDS ─── */
  .course-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.22s;
  }
  .course-card:hover { transform: translateY(-3px); border-color: rgba(79,142,247,0.3); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
  .course-banner {
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    position: relative;
    overflow: hidden;
  }
  .course-banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(0,0,0,0.3));
  }
  .course-body { padding: 16px; }
  .course-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
  .course-meta { font-size: 12px; color: var(--text3); margin-bottom: 12px; }
  .course-stats {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--text3);
    font-family: var(--font-mono);
  }
  .course-stat span { color: var(--text2); }
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-family: var(--font-mono);
    font-weight: 600;
  }
  .badge-green { background: rgba(16,185,129,0.15); color: var(--accent3); }
  .badge-blue { background: rgba(79,142,247,0.15); color: var(--accent); }
  .badge-amber { background: rgba(245,158,11,0.15); color: var(--accent4); }
  .badge-red { background: rgba(239,68,68,0.15); color: var(--accent5); }

  /* ─── TABLE ─── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 1px solid var(--border); }
  th {
    padding: 13px 18px;
    text-align: left;
    font-size: 11px;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text3);
    font-weight: 400;
  }
  td { padding: 14px 18px; font-size: 13px; color: var(--text2); border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td strong { color: var(--text); font-weight: 500; }

  /* ─── ANNOUNCEMENT ─── */
  .announcement {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: border-color 0.2s;
  }
  .announcement:hover { border-color: rgba(79,142,247,0.2); }
  .ann-icon {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .ann-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .ann-body { font-size: 13px; color: var(--text3); }
  .ann-time { font-size: 11px; color: var(--text3); font-family: var(--font-mono); margin-top: 6px; }

  /* ─── HERO WELCOME ─── */
  .hero-welcome {
    background: linear-gradient(135deg, rgba(79,142,247,0.12), rgba(124,58,237,0.08));
    border: 1px solid rgba(79,142,247,0.2);
    border-radius: var(--radius);
    padding: 28px 32px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .hero-welcome::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(79,142,247,0.1), transparent);
  }
  .hero-title { font-family: var(--font-display); font-size: 26px; margin-bottom: 6px; }
  .hero-sub { font-size: 14px; color: var(--text2); }
  .hero-emoji { font-size: 56px; }

  /* ─── QUIZ ─── */
  .quiz-option {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.18s;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .quiz-option:hover { border-color: var(--accent); color: var(--text); }
  .quiz-option.selected { border-color: var(--accent); background: rgba(79,142,247,0.1); color: var(--text); }
  .quiz-option.correct { border-color: var(--accent3); background: rgba(16,185,129,0.1); color: var(--accent3); }
  .quiz-option.wrong { border-color: var(--accent5); background: rgba(239,68,68,0.1); color: var(--accent5); }
  .option-label {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--surface3);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-family: var(--font-mono);
    font-weight: 600;
    flex-shrink: 0;
  }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: min(540px, 95vw);
    padding: 32px;
    transform: translateY(20px);
    transition: transform 0.25s;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title { font-family: var(--font-display); font-size: 22px; margin-bottom: 20px; }

  /* ─── FORM ─── */
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: var(--text3); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    outline: none;
    transition: border-color 0.18s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input option { background: var(--surface2); }
  textarea.form-input { resize: vertical; min-height: 80px; }

  /* ─── AVATAR COLORS ─── */
  .av-blue { background: rgba(79,142,247,0.2); color: var(--accent); }
  .av-purple { background: rgba(124,58,237,0.2); color: #a855f7; }
  .av-green { background: rgba(16,185,129,0.2); color: var(--accent3); }
  .av-amber { background: rgba(245,158,11,0.2); color: var(--accent4); }
  .av-red { background: rgba(239,68,68,0.2); color: var(--accent5); }

  /* ─── LOGIN PAGE ─── */
  #login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }
  #login-page::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(79,142,247,0.08), transparent 70%);
    top: -200px; left: -200px;
  }
  #login-page::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,58,237,0.06), transparent 70%);
    bottom: -100px; right: -100px;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 44px;
    width: 420px;
    position: relative;
    z-index: 1;
  }
  .login-logo { font-family: var(--font-display); font-size: 28px; margin-bottom: 4px; }
  .login-logo span { color: var(--accent); }
  .login-sub { font-size: 13px; color: var(--text3); margin-bottom: 32px; font-family: var(--font-mono); }
  .login-divider { text-align: center; color: var(--text3); font-size: 12px; margin: 20px 0; position: relative; }
  .login-divider::before { content: ''; position: absolute; left: 0; top: 50%; width: 40%; height: 1px; background: var(--border); }
  .login-divider::after { content: ''; position: absolute; right: 0; top: 50%; width: 40%; height: 1px; background: var(--border); }
  .role-select-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
  .role-select-btn {
    padding: 12px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-size: 12px;
    color: var(--text2);
  }
  .role-select-btn .icon { font-size: 20px; display: block; margin-bottom: 4px; }
  .role-select-btn:hover, .role-select-btn.active {
    border-color: var(--accent);
    background: rgba(79,142,247,0.1);
    color: var(--accent);
  }

  /* ─── CHART ─── */
  .chart-bars {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    height: 100px;
    padding-top: 10px;
  }
  .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .chart-bar {
    width: 100%;
    border-radius: 4px 4px 0 0;
    transition: height 0.8s ease;
    min-height: 4px;
  }
  .chart-bar-label { font-size: 10px; color: var(--text3); font-family: var(--font-mono); }

  /* ─── NOTIFICATION PANEL ─── */
  .notif-list { display: flex; flex-direction: column; gap: 10px; }
  .notif-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 12px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
  }
  .notif-dot-icon { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .notif-text { font-size: 13px; color: var(--text2); }
  .notif-time { font-size: 11px; color: var(--text3); font-family: var(--font-mono); margin-top: 3px; }

  /* ─── RESPONSIVE HELPERS ─── */
  .mt-6 { margin-top: 6px; }
  .mt-12 { margin-top: 12px; }
  .mt-20 { margin-top: 20px; }
  .mt-24 { margin-top: 24px; }
  .mb-16 { margin-bottom: 16px; }
  .flex { display: flex; }
  .items-center { align-items: center; }
  .gap-12 { gap: 12px; }
  .gap-8 { gap: 8px; }

  /* ─── SPARKLE ANIMATION ─── */
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(79,142,247,0.3); }
    50% { box-shadow: 0 0 0 8px rgba(79,142,247,0); }
  }
  .pulse { animation: pulse-glow 2s infinite; }

  /* toast */

function renderQuiz() {
  if(quizState.done) return renderQuizResult();
  const q = DATA.quiz.questions[quizState.current];
  const total = DATA.quiz.questions.length;
  return `
  <div class="card" style="max-width:680px;margin:0 auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div style="font-size:12px;color:var(--text3);font-family:var(--font-mono)">QUESTION ${quizState.current+1} OF ${total}</div>
      <span class="status-badge badge-blue">📚 ${DATA.quiz.title}</span>
    </div>
    <div class="progress-bar mb-16"><div class="progress-fill fill-blue" style="width:${(quizState.current/total)*100}%"></div></div>
    <div style="font-family:var(--font-display);font-size:20px;color:var(--text);margin-bottom:24px;line-height:1.4">${q.q}</div>
    <div id="quiz-options">
      ${q.opts.map((opt,i)=>`
        <div class="quiz-option" id="opt-${i}" onclick="selectOption(${i})">
          <div class="option-label">${'ABCD'[i]}</div>
          ${opt}
        </div>
      `).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:24px;align-items:center">
      <div style="font-size:13px;color:var(--text3)">${quizState.answers.filter(a=>a!=null).length} answered</div>
      <button class="btn btn-primary" id="quiz-next-btn" onclick="nextQuestion()" ${quizState.selected===null?'disabled style="opacity:0.5;cursor:not-allowed"':''}>
        ${quizState.current===total-1?'Submit Quiz ✓':'Next Question →'}
      </button>
    </div>
  </div>`;
}

function renderQuizResult() {
  const correct = quizState.answers.filter((a,i)=>a===DATA.quiz.questions[i].ans).length;
  const total = DATA.quiz.questions.length;
  const pct = Math.round(correct/total*100);
  return `
  <div class="card" style="max-width:500px;margin:0 auto;text-align:center;padding:48px">
    <div style="font-size:64px;margin-bottom:16px">${pct>=75?'🎉':pct>=50?'👍':'💪'}</div>
    <div style="font-family:var(--font-display);font-size:32px;color:var(--text);margin-bottom:8px">${pct}%</div>
    <div style="font-size:16px;color:var(--text2);margin-bottom:24px">You got ${correct} out of ${total} questions correct</div>
    <span class="status-badge ${pct>=75?'badge-green':pct>=50?'badge-blue':'badge-amber'}" style="font-size:14px;padding:8px 18px">
      ${pct>=75?'Excellent!':pct>=50?'Good Work!':'Keep Practising'}
    </span>
    <div style="margin-top:32px">
      <button class="btn btn-primary" onclick="restartQuiz()">Take Again</button>
    </div>
  </div>`;
}

function selectOption(i) {
  quizState.selected = i;
  document.querySelectorAll('.quiz-option').forEach((el,idx)=>{
    el.classList.toggle('selected', idx===i);
  });
  const btn = document.getElementById('quiz-next-btn');
  if(btn) { btn.removeAttribute('disabled'); btn.style.opacity='1'; btn.style.cursor='pointer'; }
}

function nextQuestion() {
  const q = DATA.quiz.questions[quizState.current];
  quizState.answers[quizState.current] = quizState.selected;
  if(quizState.current < DATA.quiz.questions.length-1) {
    quizState.current++;
    quizState.selected = null;
    renderView();
  } else {
    quizState.done = true;
    renderView();
  }
}

function restartQuiz() {
  quizState = { current:0, selected:null, answers:[], done:false };
  renderView();
}

function openModal(title, body) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if(e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
}
